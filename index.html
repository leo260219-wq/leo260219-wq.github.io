<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GHS的第一个网站</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 1s;
  color: white;
}

/* 不同时间段背景 */
.morning {
  background: linear-gradient(45deg, #ff9a9e, #fad0c4);
}

.afternoon {
  background: linear-gradient(45deg, #4facfe, #00f2fe);
}

.evening {
  background: linear-gradient(45deg, #f093fb, #f5576c);
}

.night {
  background: linear-gradient(45deg, #141e30, #243b55);
}

.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  padding: 60px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

h1 {
  font-size: 48px;
  margin-bottom: 20px;
}

.time {
  font-size: 20px;
  margin-bottom: 20px;
}

.visit {
  margin-top: 20px;
  font-size: 14px;
  opacity: 0.8;
}

.btn {
  display: inline-block;
  padding: 10px 25px;
  border-radius: 25px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  transition: 0.3s;
  margin-top: 20px;
}

.btn:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<div class="card">
  <h1>Leo 🚀</h1>
  <div class="time" id="time"></div>
  <p>欢迎来到我的第一个网站</p>
  <a href="posts/first-post.html" class="btn">进入成长记录</a>
  <div class="visit">访问次数：<span id="visitCount"></span></div>
</div>

<script>
/* 自动时间显示 */
function updateTime() {
  const now = new Date();
  const timeString = now.toLocaleString();
  document.getElementById("time").innerText = timeString;
}
setInterval(updateTime, 1000);
updateTime();

/* 根据时间自动变色 */
function setBackgroundByTime() {
  const hour = new Date().getHours();
  let body = document.body;

  if (hour >= 5 && hour < 12) {
    body.className = "morning";
  } else if (hour >= 12 && hour < 17) {
    body.className = "afternoon";
  } else if (hour >= 17 && hour < 20) {
    body.className = "evening";
  } else {
    body.className = "night";
  }
}
setBackgroundByTime();

/* 本地访问统计（简单版） */
let count = localStorage.getItem("visitCount");
if (!count) {
  count = 1;
} else {
  count = parseInt(count) + 1;
}
localStorage.setItem("visitCount", count);
document.getElementById("visitCount").innerText = count;
</script>

</body>
</html>

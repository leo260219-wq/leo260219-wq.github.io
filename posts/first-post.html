<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>我的第一个学习记录</title>

  <style>
    body {
      background-color: #f5f7fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
      margin: 0;
      padding: 40px 20px;   /* 减少顶部80px，避免iframe里太空 */
    }

    .container {
      max-width: 800px;
      margin: 0 auto;      /* 居中即可，不需要80px外边距 */
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    h1 {
      color: #2c3e50;
      margin-top: 0;
    }

    .date {
      color: #888;
      font-size: 14px;
      margin-bottom: 25px;
    }

    p {
      line-height: 1.8;
      color: #444;
      margin-bottom: 18px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>我的第一个学习记录</h1>
    <div class="date">2026-02-23</div>

    <p>今天我成功搭建了自己的网站（2026.2.23）。</p>
    <p>虽然只是一个简单的页面，但这是我第一次真正把内容发布到互联网上。</p>
    <p>从 0 到 1 的感觉，比我想象中更有成就感。</p>
  </div>
</body>
</html>
